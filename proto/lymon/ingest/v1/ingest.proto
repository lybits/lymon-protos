syntax = "proto3";

package lymon.ingest.v1;

// IngestService accepts telemetry streams from Lymon agents and writes
// them to the data plane (cloud or edge). The contract is designed to
// guarantee exactly-once delivery via idempotency keys carried at the
// batch level.
service IngestService {

  // StreamSamples is a bidirectional stream. The agent pushes SampleBatch
  // messages; the server acknowledges each one with a BatchAck. The agent
  // must persist its local buffer cursor only upon receiving
  // ACK_STATUS_OK or ACK_STATUS_DUPLICATE for a given batch_id.
  rpc StreamSamples(stream SampleBatch) returns (stream BatchAck);

  // Health is a simple liveness probe usable by the agent to confirm
  // connectivity before opening a long-lived stream.
  rpc Health(HealthRequest) returns (HealthResponse);
}

// SampleBatch carries a set of telemetry samples produced by an agent
// during a single collection cycle. The batch_id is the agent-generated
// idempotency key; the server uses it to detect duplicates on retry.
message SampleBatch {
  // ULID generated by the agent. Required. Globally unique per agent.
  string batch_id = 1;

  // Stable identifier of the agent (assigned at provisioning).
  string agent_id = 2;

  // Identifier of the data source within the agent
  // (e.g. "modbus-plc-3", "opcua-line-7").
  string datasource_id = 3;

  // Wall-clock time the batch was sent (agent clock, milliseconds since
  // epoch). Diagnostic only — not used for storage.
  int64 sent_at_ms = 4;

  // Samples in this batch. Must be at least 1 and at most 10000.
  repeated Sample samples = 5;
}

// Sample is a single (variable, timestamp, value) reading.
message Sample {
  // Variable identifier scoped within the datasource
  // (e.g. "holding_register/42" or "device_03/voltage_l1").
  string variable_id = 1;

  // Sample timestamp (milliseconds since epoch). The time the value was
  // read from the source, not the time the batch was sent.
  int64 ts_ms = 2;

  // The measured value, normalized to a 64-bit float.
  double value = 3;

  // Quality code (OPC-UA-style). 0 = good. Non-zero indicates various
  // error or uncertainty states. See docs for full enumeration.
  uint32 quality = 4;

  // Optional per-sample metadata. Use sparingly — variable-level
  // metadata belongs in the variable catalog, not on every sample.
  map<string, string> attrs = 5;
}

// BatchAck is sent by the server in response to each received SampleBatch.
message BatchAck {
  // Echoes the batch_id from the corresponding SampleBatch.
  string batch_id = 1;

  // The status of the batch processing.
  AckStatus status = 2;

  // Human-readable detail. May be empty on ACK_STATUS_OK.
  string detail = 3;
}

// AckStatus describes the outcome of batch ingestion.
enum AckStatus {
  ACK_STATUS_UNSPECIFIED = 0;
  // Batch was accepted and persisted.
  ACK_STATUS_OK = 1;
  // The batch_id was already seen; the original is still persisted.
  // The agent may safely advance its cursor as if it were OK.
  ACK_STATUS_DUPLICATE = 2;
  // The batch was rejected for non-transient reasons (schema invalid,
  // unauthorized, etc.). The agent must NOT retry.
  ACK_STATUS_REJECTED = 3;
  // A transient error occurred. The agent should retry with exponential
  // backoff. The cursor must NOT advance.
  ACK_STATUS_RETRY = 4;
}

message HealthRequest {}

message HealthResponse {
  // Always "ok" when reachable.
  string status = 1;
  // Server version (semver).
  string version = 2;
}
